schema: spec-driven

context: |
  Project: Freya Skin Clinic — Backend (Go + Fiber)
  Domain: Sistem Manajemen Stok Farmasi Internal Freya Skin Clinic, Sumedang
  Status: Initial development — project baru, belum ada implementasi

  Tech stack:
    - Go 1.22+
    - Fiber v2 (web framework)
    - PostgreSQL 15+ (pgx/v5 driver)
    - golang-migrate (DB migration)
    - golang-jwt (JWT auth)
    - bcrypt (password hashing)
    - joho/godotenv (env config)
    - go-playground/validator (input validation)

  Architecture (Clean Architecture):
    - Handler (HTTP) → Service (Business Logic) → Repository (Data Access) → PostgreSQL
    - Per-domain files: {domain}_handler.go, {domain}_service.go, {domain}_repo.go, {domain}.go (model)
    - Internal packages: internal/pkg/ (shared utilities, JWT, validator, response)
    - Entry points: cmd/api/, cmd/migrate/, cmd/hashgen/, cmd/api-validate/

  Database:
    - PostgreSQL dengan ACID transaction
    - Migration sequential numbering (000001_, 000002_, dst)
    - snake_case naming, ENUM types, TIMESTAMP WITH TIME ZONE
    - Tables: users, kategori, produk, stok_masuk, batch_stok, stok_keluar,
              kemasan_terbuka, stok_opname, detail_opname

  Auth:
    - JWT token dengan expiry
    - Middleware auth pada semua endpoint kecuali POST /api/auth/login
    - Single role: Admin Farmasi
    - Login pertama (password default) wajib ganti password

  Background Workers:
    - Goroutine: auto-update batch_stok.status → KADALUWARSA jika expired_date < now
    - Goroutine: nonaktifkan kemasan_terbuka jika BUD < now

  API:
    - Base URL: /api
    - Auth header: Authorization: Bearer <token>
    - Format: JSON, ISO 8601 untuk tanggal
    - Standard response: { "success": bool, "message": string, "data": any, "errors": any }
    - Frontend: React SPA (lihat Freya-Skin-Clinic)

  Conventions:
    - Bahasa: Label & pesan error dalam Bahasa Indonesia
    - Commit: Conventional commits
    - Transaction: Semua operasi multi-tabel dalam DB transaction
    - Error: Custom error types; response terstruktur

  Modules (KF):
    KF-01: Autentikasi (Login, Ganti Password paksa)
    KF-02: Kelola Kategori
    KF-03: Kelola Produk
    KF-04: Kelola Stok Masuk (batch + expired date)
    KF-05: Kelola Stok Keluar (full use & partial use)
    KF-06: Penerapan FEFO (otomatis)
    KF-07: Kelola BUD (Beyond Use Date, 28 hari)
    KF-08: Monitoring Stok real-time
    KF-09: Stock Opname (histori koreksi)
    KF-10: Laporan Stok periodik

  SRS docs: docs/srs-overview.md, docs/srs-fr.md, docs/srs-nfr.md,
            docs/srs-backend.md, docs/srs-api.md, docs/srs-database.md

rules:
  proposal:
    - Sertakan modul KF yang terdampak
    - Sertakan acceptance criteria yang dapat diuji
    - Sertakan daftar migration, handler, service, dan repository yang perlu dibuat atau dimodifikasi
  specs:
    - Gunakan format Given/When/Then untuk setiap skenario
    - Referensikan KF dan AC yang relevan dari srs-fr.md
    - Sertakan validasi input dan error handling yang diwajibkan
  design:
    - Sertakan diagram flow (Handler → Service → Repository)
    - Sertakan definisi migration SQL dan index yang dibutuhkan
    - Sertakan pendekatan concurrency untuk background worker jika relevan
  tasks:
    - Pisahkan task per layer: migration, repository, service, handler, test
    - Setiap task harus atomic dan dapat diverifikasi secara mandiri
    - Task migration harus dijalankan sebelum task repository terkait
